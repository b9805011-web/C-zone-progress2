        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #2c3e50; /* 深色背景讓圖面更明顯 */
            color: white;
            padding: 20px;
            text-align: center;
        }
        .image-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        /* 
           ===== 調整熱區框線 =====
           已經將 border 設為 transparent (透明)，隱藏紅色虛線。
           你可以將 'transparent' 改回 'red' 來暫時顯示框線以便確認對位。
        */
        .hotspot {
            position: absolute;
            cursor: pointer;
            border: 2px solid transparent; /* 已隱藏 */
            background-color: rgba(255, 255, 255, 0.0);
            transition: all 0.2s;
            /* 將高度設為 100%，蓋住整戶的立面 */
            height: 100%;
        }
        .hotspot:hover {
            /* background-color: rgba(255, 215, 0, 0.35); /* 游標滑過時顯示半透明黃色 */
            border: 2px solid #b8ac7c00;
        }

        /* 資訊浮水印 (Tooltip) 樣式 */
        .tooltip {
            position: absolute;
            display: none;
            background-color: rgba(20, 20, 20, 0.95);
            color: #f8fafc;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #475569;
            pointer-events: none; 
            z-index: 100;
            text-align: left;
            min-width: 220px;
            white-space: pre-line; /* 讓你在資料區手打的換行直接生效 */
        }
        .tooltip h3 {
            margin: 0 0 10px 0;
            color: #38bdf8;
            border-bottom: 1px solid #475569;
            padding-bottom: 5px;
        }
        .completed { color: #4ade80; font-weight: bold; margin-top: 10px; }
        .pending { color: #facc15; font-weight: bold; margin-top: 10px; }
        .content-text { margin-top: 5px; font-size: 15px; line-height: 1.6; }
    </style>
</head>

            spot.addEventListener('mouseenter', function(e) {

                const data = progressData[unitId];

                if (data) {
                    let htmlContent = `<h3>${unitId} 戶 立面進度</h3>`;
                    
                    htmlContent += `<div class="completed">✅ 已完成：</div>`;
                    htmlContent += `<div class="content-text">${data.completed.trim()}</div>`;

                    htmlContent += `<div class="content-text">${data.pending.trim()}</div>`;

                    tooltip.innerHTML = htmlContent;
                    tooltip.style.display = 'block';
                }
            });

            spot.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            });
